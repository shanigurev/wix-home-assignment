<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>A/B Test Assignment</title>
<meta name="viewport" content="width=1600">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #ededed;
    color: #111;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ---- Editor chrome ---- */
  .topbar {
    height: 44px;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    position: relative;
    z-index: 30;
  }
  .topbar-logo {
    display: flex; align-items: center; gap: 4px;
    font-weight: 700; font-size: 14px;
    letter-spacing: -0.01em;
    padding-right: 4px;
  }
  .topbar-logo .mark { display: none; }
  .topbar-site {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #555;
    padding: 4px 10px;
    border-radius: 0;
  }
  .topbar-site .avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, #d4d4d4, #9a9a9a);
    display: grid; place-items: center;
    color: #fff; font-size: 11px; font-weight: 600;
  }
  .topbar-nav {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px;
  }
  .topbar-nav button {
    background: transparent; border: 0;
    padding: 6px 10px; border-radius: 0;
    color: #333;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .topbar-nav button:hover { background: #f3f3f3; }
  .topbar-fit { margin-left: auto; font-size: 13px; color: #555; padding: 0 12px; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .pill {
    font-size: 12px; padding: 4px 10px; border-radius: 0;
    background: #f5f5f5; color: #555; border: 1px solid #d9d9d9;
  }
  .ghost-btn { background: transparent; border: 0; padding: 6px 10px; border-radius: 0; font-size: 13px; color: #333; }
  .ghost-btn:hover { background: #f3f3f3; }
  .primary-btn {
    background: #111; color: #fff; border: 0;
    padding: 8px 14px; border-radius: 0; font-size: 13px; font-weight: 500;
  }
  .primary-btn:hover { background: #000; }
  .primary-btn:disabled { background: #d9d9d9; color: #888; cursor: not-allowed; }

  /* ---- Stage layout ---- */
  .stage {
    position: absolute;
    inset: 44px 0 0 0;
    display: flex;
    overflow: hidden;
  }
  .left-rail { display: none; }
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: auto;
    background: #ededed;
    padding: 0 16px 16px 16px;
  }
  .canvas-area.regenerating::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.08) 55%, rgba(255, 255, 255, 0) 80%),
      rgba(255, 255, 255, 0.22);
    animation: canvasRegenPulse 0.95s ease-in-out infinite;
    z-index: 10;
  }
  .canvas-area.regenerating::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.26) 50%, rgba(255,255,255,0) 100%);
    animation: canvasRegenSweep 1.1s linear infinite;
    z-index: 9;
  }
  .canvas-area.regenerating .browser-frame {
    animation: canvasRegenScale 0.95s ease-in-out infinite;
    transform-origin: top center;
  }
  @keyframes canvasRegenPulse {
    0%, 100% { opacity: 0.28; }
    50% { opacity: 0.72; }
  }
  @keyframes canvasRegenSweep {
    0% { transform: translateX(-100%); opacity: 0.15; }
    40% { opacity: 0.6; }
    100% { transform: translateX(100%); opacity: 0.15; }
  }
  @keyframes canvasRegenScale {
    0%, 100% { transform: scale(1); filter: brightness(1) saturate(1); }
    50% { transform: scale(0.992); filter: brightness(0.86) saturate(0.9); }
  }

  /* ---- Sub-toolbar ---- */
  .sub-toolbar {
    position: sticky;
    top: 0;
    height: 48px;
    background: #ededed;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    z-index: 12;
  }
  .sub-toolbar .add-btn {
    background: #fff; border: 1px solid #d9d9d9;
    padding: 5px 14px; border-radius: 0;
    font-size: 13px; color: #111;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background 120ms;
  }
  .sub-toolbar .add-btn:hover { background: #f5f5f5; }
  .sub-toolbar .ctx-actions {
    flex: 1;
    display: flex; justify-content: center; align-items: center;
    gap: 0;
    height: 36px;
    padding: 0; margin: 0;
    transition: opacity 200ms;
  }
  .sub-toolbar .ctx-btn {
    background: transparent; border: 0;
    padding: 6px 12px; border-radius: 0;
    font-size: 13px; color: #1a1a1a;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    transition: background 100ms;
  }
  .sub-toolbar .ctx-btn:hover { background: rgba(0,0,0,0.05); }
  .sub-toolbar .ctx-btn.primary-action { font-weight: 500; color: #1a1a1a; }
  .sub-toolbar .ctx-btn.icon-only { padding: 6px; color: #555; }
  .sub-toolbar .ctx-divider {
    width: 1px; height: 16px; background: #c8c8c8;
    margin: 0 6px;
  }

  /* ---- Page dropdown ---- */
  .page-dropdown {
    position: relative;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    background: #fff;
    border: 1px solid #d9d9d9;
    font-size: 11px; color: #333;
    cursor: pointer;
    border-radius: 0;
  }
  .page-dropdown:hover { border-color: #999; }

  /* ---- Selectable site elements ---- */
  .site-selectable {
    cursor: pointer;
    transition: outline 120ms;
    outline: 2px solid transparent;
    outline-offset: 4px;
  }
  .site-selectable:hover { outline-color: rgba(0,0,0,0.25); }
  .site-selectable.is-selected { outline-color: #111 !important; outline-style: dashed; }

  /* ---- Browser frame ---- */
  .browser-frame {
    margin: 0 auto;
    width: min(1100px, calc(100% - 24px));
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 0;
    overflow: hidden;
    transform-origin: top center;
  }
  .browser-bar {
    height: 36px;
    background: #fafafa;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px; color: #6b6b6b;
    gap: 12px;
  }
  .browser-bar .dots { display: flex; gap: 6px; }
  .browser-bar .dots span { width: 10px; height: 10px; border-radius: 50%; background: #e0e0e0; }
  .browser-bar .device-toggle { display: flex; gap: 4px; }
  .browser-bar .device-toggle button {
    width: 22px; height: 18px; background: transparent; border: 1px solid #d0d0d0; border-radius: 0;
    color: #888; display: grid; place-items: center;
  }
  .browser-bar .device-toggle button.active { color: #333; border-color: #999; }

  /* ---- Floating panel ---- */
  .floating-panel {
    position: absolute;
    left: 20px; top: 4px;
    width: 400px;
    height: calc(100% - 8px);
    background: #fff;
    border: 1px solid #dddddd;
    border-radius: 0;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
    z-index: 20;
    overflow: hidden;
  }
  .floating-panel.narrow { width: 300px; }
  .panel-h {
    padding: 16px 16px 14px 20px;
    display: flex; align-items: flex-start; justify-content: space-between;
    border-bottom: 1px solid #ebebeb;
  }
  .panel-h .title { font-size: 15px; font-weight: 600; color: #111; line-height: 1.2; }
  .panel-h .subtitle { font-size: 12px; font-weight: 400; color: #999; margin-top: 4px; line-height: 1.3; }
  .panel-h .actions { display: flex; gap: 0; }
  .icon-btn {
    width: 28px; height: 28px;
    background: transparent; border: 0; border-radius: 50%;
    display: grid; place-items: center; color: #333;
    transition: background 120ms;
  }
  .icon-btn:hover { background: #f3f3f3; }
  .icon-btn:active { background: #e8e8e8; }

  /* ---- Stepper ---- */
  .stepper {
    height: 44px;
    border-bottom: 1px solid #ebebeb;
    display: flex; align-items: center; justify-content: center;
    gap: 0; font-size: 13px; flex-shrink: 0;
    padding: 0 20px;
  }
  .stepper button {
    background: transparent; border: 0; padding: 4px 6px;
    color: #aaa; border-radius: 0;
    display: inline-flex; align-items: center; gap: 0;
    font-weight: 400; font-size: 13px;
    transition: color 120ms;
  }
  .stepper button.active { color: #111; font-weight: 500; }
  .stepper button.done { color: #888; cursor: pointer; }
  .stepper button:disabled { cursor: not-allowed; opacity: 1; }
  .stepper button:not(:disabled):hover { color: #111; }
  .stepper .sep { color: #ccc; display: flex; align-items: center; margin: 0 2px; }

  /* ---- Generating loader ---- */
  .gen-loader {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px; gap: 20px;
    animation: fadeIn 200ms ease;
  }
  .gen-loader-title { font-size: 18px; font-weight: 600; color: #111; text-align: center; }
  .gen-loader-bar {
    width: 100%; height: 3px; background: #e8e8e8; overflow: hidden; border-radius: 2px;
  }
  .gen-loader-bar-fill {
    height: 100%; background: #111; border-radius: 2px;
    animation: genProgress 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes genProgress {
    0% { width: 0%; }
    30% { width: 40%; }
    60% { width: 65%; }
    85% { width: 82%; }
    100% { width: 90%; }
  }
  .gen-loader-sub { font-size: 13px; color: #aaa; text-align: center; }

  /* ---- Step 2 settings layout ---- */
  .step2-wrap { display: flex; flex-direction: column; }
  .step2-banner {
    margin: 16px 20px 4px;
    background: #f7f7f7; border: 1px solid #e8e8e8;
    padding: 10px 14px; font-size: 13px; color: #444;
    display: flex; align-items: flex-start; gap: 8px; line-height: 1.45;
  }
  .step2-banner svg { flex-shrink: 0; margin-top: 1px; }
  .step2-section { padding: 20px 20px 0; }
  .step2-section-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 14px; }
  .step2-label { font-size: 12px; color: #888; margin-bottom: 5px; }
  .step2-field {
    width: 100%; border: 1px solid #ddd; padding: 9px 12px;
    font: inherit; font-size: 13px; color: #111;
    background: #fff; outline: none;
  }
  .step2-field:focus { border-color: #888; }
  .step2-select-wrap { position: relative; }
  .step2-select-wrap select {
    width: 100%; border: 1px solid #ddd; padding: 9px 32px 9px 12px;
    font: inherit; font-size: 13px; color: #111;
    background: #fff; outline: none;
    appearance: none; cursor: pointer;
  }
  .step2-select-wrap select:focus { border-color: #888; }
  .step2-select-wrap svg { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #888; }
  .step2-divider { border: none; border-top: 1px solid #ebebeb; margin: 20px 20px 0; }
  .step2-field-gap { margin-bottom: 12px; }
  .metric-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .metric-chip {
    border: 1px solid #ddd; background: #fff; padding: 7px 14px;
    font-size: 13px; color: #555; border-radius: 0; cursor: pointer;
    transition: border-color 120ms, color 120ms;
  }
  .metric-chip:hover { border-color: #888; color: #111; }
  .metric-chip.selected { border-color: #111; border-width: 1.5px; color: #111; font-weight: 500; }
  .metric-subtitle { font-size: 12px; color: #888; margin-bottom: 14px; margin-top: -8px; line-height: 1.4; }
  .step2-advanced-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 20px; cursor: pointer;
  }
  .step2-advanced-row:hover .step2-adv-arrow { color: #111; }
  .step2-adv-title { font-size: 15px; font-weight: 700; color: #111; }
  .step2-adv-sub { font-size: 12px; color: #888; margin-top: 3px; }
  .step2-adv-arrow { color: #bbb; transition: color 120ms; }
  .adv-body { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 0; }
  .adv-section { border-bottom: 1px solid #ebebeb; padding: 16px 0; }
  .adv-section:last-child { border-bottom: 0; padding-bottom: 4px; }
  .adv-section-title { font-size: 13px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .adv-section-sub { font-size: 11px; color: #888; margin-bottom: 12px; line-height: 1.4; }
  .adv-sublabel { font-size: 11px; color: #555; margin-bottom: 6px; margin-top: 12px; }
  .adv-sublabel:first-of-type { margin-top: 0; }
  .adv-btn-group { display: flex; width: 100%; border: 1px solid #d9d9d9; overflow: hidden; }
  .adv-btn-group button {
    flex: 1; padding: 8px 4px; background: #fff; border: 0;
    border-right: 1px solid #d9d9d9;
    font-size: 11px; color: #555;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; transition: background 120ms;
  }
  .adv-btn-group button:last-child { border-right: 0; }
  .adv-btn-group button.active { background: #f0f0f0; color: #111; font-weight: 500; }
  .adv-btn-group button svg { opacity: 0.6; }
  .adv-btn-group button.active svg { opacity: 1; }
  .adv-exposure-row { display: flex; align-items: center; gap: 10px; }
  .adv-exposure-val { font-size: 13px; font-weight: 500; color: #111; min-width: 38px; }
  .adv-exposure-row input[type="range"] { flex: 1; }
  .adv-split-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .adv-split-row:last-child { margin-bottom: 0; }
  .adv-split-label { font-size: 12px; font-weight: 500; color: #555; min-width: 38px; display: flex; align-items: center; gap: 5px; }
  .adv-split-label .var-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #bbb; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; color: #555; }
  .adv-split-row input[type="range"] { flex: 1; }
  .adv-body input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 4px; background: #d0d0d0; border-radius: 2px; outline: none;
  }
  .adv-body input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #111; cursor: pointer; border: 0;
  }
  .adv-body input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: #111; cursor: pointer; border: 0;
  }

  /* ---- Panel scroll ---- */
  .panel-body { flex: 1; overflow-y: auto; }
  .panel-body.variant-b-content-panel {
    display: flex;
    width: 360px;
    height: 832px;
    padding: 16px 0 8px 0;
    flex-direction: column;
    align-items: flex-start;
    background: #FFF;
    margin: 0 auto;
    align-self: center;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel-body.variant-b-content-panel .changes-list {
    width: 100%;
    padding: 0 16px 8px;
  }
  .panel-foot {
    border-top: 1px solid #ebebeb;
    padding: 16px 20px 14px;
    background: #fff; flex-shrink: 0;
  }
  .panel-foot .row { display: flex; justify-content: space-between; align-items: center; }
  .panel-foot .disclaimer {
    margin-top: 10px; font-size: 11.5px;
    text-align: center; color: #aaa; line-height: 1.4;
  }
  .generate-btn {
    width: 100%; height: 46px; border: 0; border-radius: 0;
    background: #111; color: #fff;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 120ms; cursor: pointer;
  }
  .generate-btn.inline {
    width: auto;
    min-width: 130px;
    height: 44px;
    padding: 0 18px;
  }
  .generate-btn:not(:disabled):hover { background: #000; }
  .generate-btn.disabled, .generate-btn:disabled { background: #d9d9d9; color: #999; cursor: not-allowed; }
  .back-btn {
    background: transparent; border: 0;
    display: inline-flex; align-items: center; gap: 4px;
    color: #6b6b6b; font-size: 16px; padding: 8px 10px;
  }
  .back-btn:hover { color: #111; }
  .next-btn {
    background: #111; color: #fff; border: 0;
    padding: 8px 14px; border-radius: 0;
    font-size: 16px; font-weight: 400;
    min-width: 102px; transition: background 120ms;
  }
  .next-btn.disabled, .next-btn:disabled { background: #d9d9d9; color: #888; cursor: not-allowed; }
  .next-btn:not(:disabled):hover { background: #000; }

  /* ---- Inputs ---- */
  .field-label-row { display: flex; justify-content: space-between; align-items: center; }
  .field-label { font-size: 14px; color: #111; }
  .char-count { font-size: 14px; color: #6b6b6b; font-variant-numeric: tabular-nums; }
  .char-count.warn { color: #555; }
  .textarea-shell {
    border: 1px solid #e0e0e0; background: #fff;
    transition: border-color 120ms;
    display: flex; flex-direction: column;
    border-radius: 4px;
  }
  .textarea-shell:focus-within { border-color: #999; }
  .textarea-shell textarea {
    flex: 1; border: 0; resize: none;
    font: inherit; font-size: 13px; color: #333;
    padding: 14px 14px 8px 14px;
    background: transparent; outline: none;
    line-height: 1.5; min-height: 110px;
  }
  .textarea-shell textarea::placeholder { color: #bbb; }
  .enhance-row {
    padding: 8px 12px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid #f0f0f0;
  }
  .enhance-btn {
    background: transparent; border: 0;
    font-weight: 400; font-size: 13px; color: #999;
    padding: 0;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color 120ms;
    cursor: pointer;
  }
  .enhance-btn:not(:disabled):hover { color: #555; }
  .enhance-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .enhance-btn.active { color: #555; }
  .mic-btn {
    background: transparent; border: 0; padding: 0;
    color: #bbb; display: grid; place-items: center;
    transition: color 120ms; cursor: pointer;
  }
  .mic-btn:hover { color: #888; }
  .suggestion-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .chip {
    border: 1px solid #e0e0e0; background: #fff;
    padding: 7px 14px; font-size: 13px; color: #333;
    border-radius: 20px; transition: background 120ms, border-color 120ms;
    text-align: center;
  }
  .chip:hover { background: #f5f5f5; border-color: #bbb; }

  /* ---- Step content ---- */
  .step-pad-32 { padding: 32px 20px; }

  /* ---- Accordion ---- */
  .accordion-list { display: flex; flex-direction: column; gap: 16px; padding: 16px 20px; }
  .acc-item { border: 1px solid #d9d9d9; background: #fff; transition: border-color 120ms; }
  .acc-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; cursor: pointer; user-select: none;
  }
  .acc-head .titleblock { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
  .acc-head .titletext { font-weight: 700; font-size: 14px; color: #333; line-height: 1.4; }
  .progress-bar { width: 148px; height: 4px; background: #ededed; overflow: hidden; position: relative; }
  .progress-bar .fill { position: absolute; left: 0; top: 0; bottom: 0; background: #111; transition: width 240ms ease, background 240ms; }
  .acc-head .right { display: flex; align-items: center; gap: 16px; }
  .acc-head .count { font-size: 14px; color: #6b6b6b; font-variant-numeric: tabular-nums; }
  .acc-head .count.complete { color: #111; font-weight: 500; }
  .acc-body { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .formrow { display: flex; flex-direction: column; gap: 6px; }
  .formrow label { font-size: 12px; color: #555; }
  .formrow input[type="text"], .formrow textarea, .formrow select {
    border: 1px solid #d9d9d9; padding: 8px 10px;
    font: inherit; font-size: 14px; background: #fff; color: #111;
    outline: none; border-radius: 0;
  }
  .formrow input[type="text"]:focus, .formrow textarea:focus, .formrow select:focus { border-color: #888; }
  .formrow textarea { resize: none; min-height: 60px; }
  .formrow .help { font-size: 12px; color: #6b6b6b; }
  .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pill-grid button {
    border: 1px solid #d9d9d9; background: #fff;
    padding: 12px; font-size: 14px; text-align: center; color: #333;
    transition: all 120ms;
  }
  .pill-grid button:hover { border-color: #888; }
  .pill-grid button.selected { border-color: #111; background: #111; color: #fff; }
  .seg { display: inline-flex; border: 1px solid #d9d9d9; overflow: hidden; }
  .seg button { padding: 6px 14px; background: #fff; border: 0; font-size: 13px; color: #555; }
  .seg button + button { border-left: 1px solid #d9d9d9; }
  .seg button.active { background: #111; color: #fff; }

  .abp-stop { height: 28px; padding: 0 10px; border: 1px solid #c9c9c9; background: #f8f8f8; color: #333; font-size: 12px; white-space: nowrap; cursor: pointer; }
  .abp-icon { width: 24px; height: 24px; border: 0; background: transparent; color: #444; display: grid; place-items: center; cursor: pointer; }
  .abp-body { padding: 14px 18px 0; }
  .abp-lines { color: #222; font-size: 13px; }
  .abp-lines .line { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; color: #333; }
  .abp-lines .pill-live { background: #dbe8ff; border: 1px solid #bfd0ef; padding: 1px 6px; color: #294a77; font-size: 11px; }
  .abp-more { margin-top: 10px; border: 0; background: transparent; padding: 0; font-size: 13px; font-weight: 600; cursor: pointer; color: #111; display: block; }
  .abp-sec { border-top: 1px solid #e5e5e5; margin-top: 14px; padding: 14px 18px 0; }
  .abp-sec h4 { margin: 0; font-size: 15px; font-weight: 700; color: #111; }
  .abp-sec .s { margin-top: 4px; color: #6a6a6a; font-size: 12px; line-height: 1.4; }
  .abp-variant { margin-top: 10px; border: 1px solid #d4d4d4; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .abp-variant.selected { border: 2px dashed #222; padding: 9px 11px; }
  .abp-variant .l1 { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
  .abp-variant .dot { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #999; display: grid; place-items: center; font-size: 11px; color: #555; flex-shrink: 0; }
  .abp-variant .best { background: #dbe8ff; border: 1px solid #bfd0ef; padding: 1px 5px; color: #294a77; font-size: 11px; }
  .abp-variant .meta { margin-top: 4px; color: #6b6b6b; font-size: 12px; padding-left: 30px; }
  .abp-kpis { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .abp-kpi { border: 1px solid #d7d7d7; padding: 8px 10px; }
  .abp-kpi .k { color: #666; font-size: 12px; }
  .abp-kpi .v { margin-top: 4px; font-size: 22px; font-weight: 500; color: #111; }
  .abp-sec.grow { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .abp-chart {
    margin-top: 10px;
    border: 1px solid #d7d7d7;
    padding: 10px 12px 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .abp-chart .t { color: #666; font-size: 11px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .abp-chart .t-legend { display: inline-flex; gap: 10px; font-size: 10px; }
  .abp-chart .t-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .abp-chart .t-legend .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .abp-chart .chart-svg { width: 100%; flex: 1; display: block; min-height: 100px; }
  .abp-foot {
    margin-top: auto;
    border-top: 1px solid #e5e5e5;
    padding: 12px 16px;
    text-align: center;
  }
  .abp-foot button {
    border: 0;
    background: transparent;
    color: #111;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  /* ---- Site pages panel ---- */
  .pages-head {
    padding: 12px 16px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pages-head h2 {
    margin: 0; font-size: 16px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
  }
  .pages-section { padding: 8px 16px 0; }
  .pages-section-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 500; color: #6b6b6b;
    cursor: pointer; padding: 8px 0;
  }
  .pages-cards {
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto; padding: 4px 16px 0; flex: 1;
  }
  .page-card {
    border: 1px solid #cfcfcf; background: #fff;
    transition: border-color 120ms; position: relative; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; min-height: 62px;
  }
  .page-card:hover { border-color: #999; }
  .page-card.selected { border-color: #111; border-style: dashed; }
  .page-card .thumb {
    width: 68px; height: 100%;
    min-height: 62px;
    background-image: linear-gradient(135deg, transparent calc(50% - 0.5px), #c8c8c8 calc(50% - 0.5px), #c8c8c8 calc(50% + 0.5px), transparent calc(50% + 0.5px));
    background-color: #efefef;
    border-right: 1px solid #d7d7d7;
    flex-shrink: 0;
    position: relative;
  }
  .page-card .thumb .ab-pill {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #dbe8ff;
    border: 1px solid #b8cbef;
    color: #2d4a7d;
    font-size: 9px;
    line-height: 1;
    padding: 2px 4px;
  }
  .page-card .thumb .ab-pill.completed {
    background: #d8efe6;
    border-color: #b7d9ca;
    color: #245546;
  }
  .page-card .row {
    padding: 8px 10px 8px 12px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 16px; line-height: 1.2; font-weight: 400; color: #222;
    width: 100%;
    min-width: 0;
  }
  .page-card .row-right {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-left: 10px;
  }
  .page-card .home-indicator {
    color: #6b6b6b;
    display: grid;
    place-items: center;
    width: 20px;
    height: 20px;
  }
  .page-card .more {
    background: transparent; border: 0; color: #6b6b6b;
    width: 24px; height: 24px; border-radius: 0; display: grid; place-items: center;
    opacity: 0;
    transition: opacity 120ms, background 120ms, color 120ms;
  }
  .page-card:hover .more,
  .page-card .more:focus-visible { opacity: 1; }
  .page-card .more:hover { background: #f3f3f3; color: #111; }
  .page-card .more.selected {
    opacity: 1;
    background: #ececec;
    color: #111;
  }
  .page-card .test-row { display: none; }
  .pages-foot {
    border-top: 1px solid #ccc; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    background: #fff; flex-shrink: 0;
  }
  .pages-foot button { height: 48px; border: 0; font-size: 16px; font-weight: 500; border-radius: 0; }
  .pages-foot .add { background: #f4f4f4; color: #111; }
  .pages-foot .add:hover { background: #ebebeb; }
  .pages-foot .manage { background: #111; color: #fff; }
  .pages-foot .manage:hover { background: #000; }

  /* ---- Context menu ---- */
  .ctx-menu {
    position: fixed; background: #fff; border: 1px solid #cccccc;
    width: 188px; z-index: 100; padding: 4px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); animation: ctxIn 120ms ease-out;
  }
  @keyframes ctxIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .ctx-menu .sep { border-top: 1px solid #cccccc; margin: 4px 0; }
  .ctx-item {
    width: 100%; height: 28px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; background: transparent; border: 0;
    font-size: 12px; color: #111; text-align: left;
  }
  .ctx-item:hover { background: #f4f4f4; }
  .ctx-item.highlight { background: #f4f4f4; font-weight: 400; }
  .ctx-item .new {
    background: #333; color: #fff;
    font-size: 10px; font-weight: 500; padding: 2px 4px;
  }

  /* ---- Site preview content ---- */
  .site-page { padding: 32px 56px 64px; min-height: 600px; }
  .site-nav-row { display: flex; align-items: center; justify-content: space-between; padding: 0 0 32px; }
  .site-brand { font-weight: 600; font-size: 18px; line-height: 1.1; }
  .site-brand .sub { font-weight: 400; font-size: 13px; color: #555; }
  .site-nav { display: flex; gap: 28px; font-size: 14px; color: #333; }
  .site-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; min-height: 420px; }
  .site-img-ph {
    aspect-ratio: 1.05;
    background-image: linear-gradient(135deg, transparent calc(50% - 0.5px), #cccccc calc(50% - 0.5px), #cccccc calc(50% + 0.5px), transparent calc(50% + 0.5px));
    border: 1px solid #d9d9d9; background-color: #fff;
  }
  .site-h1 {
    font-size: 44px; line-height: 1.1; font-weight: 600; letter-spacing: -0.02em;
    margin: 0 0 24px; color: #111;
  }
  .site-h1 .var-pill {
    display: inline-block; vertical-align: middle;
    background: #f3f3f3; color: #444; font-size: 12px;
    padding: 2px 8px; border-radius: 0; margin-left: 8px; font-weight: 500; letter-spacing: 0;
  }
  [data-variant="A"] .var-pill::before { content: "Variant A"; }
  [data-variant="B"] .var-pill::before { content: "Variant B"; }
  .site-p { font-size: 16px; color: #444; line-height: 1.55; margin: 0 0 28px; max-width: 480px; }
  .site-cta-lg {
    background: #fff; border: 1px solid #888;
    padding: 12px 22px; font-size: 16px; cursor: pointer;
  }
  .site-strip {
    margin-top: 64px; padding: 16px 0;
    border-top: 1px solid #ddd; border-bottom: 1px solid #ddd;
    overflow: hidden; white-space: nowrap; font-size: 16px; color: #555;
  }
  .site-strip span { margin: 0 24px; }

  /* ---- Bottom chrome ---- */
  .bottom-utils {
    position: absolute; left: 248px; bottom: 16px;
    display: flex; flex-direction: column; gap: 6px; z-index: 14;
  }
  .stage:not(:has(.floating-panel)) .bottom-utils { left: 16px; }
  .bottom-utils button {
    width: 28px; height: 28px; background: transparent; border: 0;
    color: #6b6b6b; display: grid; place-items: center; border-radius: 0;
  }
  .bottom-utils button:hover { background: rgba(0,0,0,0.06); color: #111; }
  .bottom-chat {
    position: absolute; right: 16px; bottom: 16px;
    width: 36px; height: 36px; border-radius: 50%; background: #111;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18); cursor: pointer;
    display: grid; place-items: center; color: #fff; z-index: 14;
    transition: transform 120ms;
  }
  .bottom-chat:hover { transform: scale(1.06); }
  .section-handles {
    position: absolute; left: 248px; top: 50%; transform: translateY(-50%);

  .stage:not(:has(.floating-panel)) .section-handles { left: 6px; }
  .section-handles button {
    width: 22px; height: 22px; background: #fff; border: 1px solid #d9d9d9;
    color: #555; border-radius: 0; display: grid; place-items: center;
    transition: background 120ms, color 120ms;
  }
  .section-handles button:hover { background: #f5f5f5; color: #111; border-color: #999; }
  .section-rightmenu {
    position: absolute; right: 24px; bottom: 68px;
    display: flex; flex-direction: column; gap: 4px; z-index: 14;
    animation: rmenuIn 180ms ease-out;
  }
  @keyframes rmenuIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .section-rightmenu button {
    background: #fff; border: 1px solid #d9d9d9;

    transition: background 100ms, border-color 100ms; white-space: nowrap;
  }
  .section-rightmenu button:hover { background: #fafafa; border-color: #999; }

  @keyframes flowsPulse {

    50% { box-shadow: 0 0 0 5px rgba(59,130,246,0.25); border-color: #3b82f6; background: #eff6ff; }

    top: 0;
    right: 16px;
    width: 180px;
    background: #fff;
    border: 1px solid #d9d9d9;
    z-index: 25;
    animation: flowsPulse 0.75s ease-in-out 5;
    animation-delay: 0.5s;
    animation-fill-mode: both;
  }
  .flows-head {
    width: 100%;
    height: 44px;
    border: 0;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 11px;
    color: #222;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .flows-list {
    border-top: 1px solid #e5e5e5;
    padding: 8px 0;
  }
  .flow-item {
    width: 100%;
    border: 0;
    background: transparent;
    text-align: left;
    padding: 4px 12px;
    font-size: 11px;
    line-height: 1.35;
    color: #222;
  }
  .flow-item:hover { background: #f5f5f5; }
  .flow-item.disabled {
    color: #9a9a9a;
    cursor: default;
  }
  .flow-item.disabled:hover { background: transparent; }

  /* ---- Toast ---- */
  .toast {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 24px; background: #111; color: #fff; font-size: 13px;
    padding: 10px 14px; border-radius: 0;
    display: inline-flex; align-items: center; gap: 16px;
    z-index: 50; animation: toastIn 160ms ease-out;

  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .toast button { background: transparent; border: 0; color: #fff; text-decoration: underline; font-weight: 500; padding: 0; cursor: pointer; }

  /* ---- Shimmer ---- */
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .shimmer-text {
    background: linear-gradient(90deg, #eee 0%, #f6f6f6 50%, #eee 100%);

  /* ---- Animations ---- */
  .fade-in { animation: fadeIn 220ms ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- Variant sublist ---- */
  .variant-sublist {
    margin: 4px 0 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .variant-sublist::before {
    content: '';
    position: absolute;
    left: 6px;
    top: -12px;
    bottom: 20px;
    width: 1px;
    background: #d9d9d9;
  }
  .variant-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border: 1px solid #d0d0d0; background: #fff;
    cursor: pointer; transition: border-color 120ms, background 120ms;
    margin-left: 18px; position: relative;
    min-height: 40px;
  }
  .variant-card::after {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    width: 10px;
    height: 1px;
    background: #d9d9d9;
  }
  .variant-card:hover { border-color: #999; }
  .variant-card.selected { border-color: #111; background: #f8f8f8; }
  .variant-card .v-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #b5b5b5;
    display: grid;
    place-items: center;
    color: #3f3f3f;
    font-size: 14px;
    flex-shrink: 0;
  }
  .variant-card .v-name { font-size: 32px; transform: scale(0.5); transform-origin: left center; margin-right: -120px; white-space: nowrap; color: #222; }
  .page-card .test-row {
    padding: 6px 12px; border-top: 1px solid #eee;
    display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6b6b6b;
  }
  .page-card .test-row .test-dot { width: 6px; height: 6px; border-radius: 50%; background: #666; }
  .page-card .test-row.live .test-dot { background: #333; animation: livePulse 1.6s ease-in-out infinite; }
  @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>

const SUGGESTIONS = ['More clicks', 'Boost sign-ups', 'Higher engagement', 'Lower bounce rate'];
const DEFAULT_GOAL_PROMPT = 'Increase clicks on the main CTA by testing improved button placement and more compelling, action-oriented copy.';

const Step1Goal = ({ goal, setGoal, enhancing, onEnhance }) => {
  const max = 2000;
  const taRef = useRef();
  const applyDefaultGoal = () => {
    if (!goal.trim()) setGoal(DEFAULT_GOAL_PROMPT);
  };
  const addSuggestion = (text) => {
    if (text === 'More clicks' && !goal.trim()) {
      setGoal(DEFAULT_GOAL_PROMPT);
      setTimeout(() => taRef.current && taRef.current.focus(), 50);
      return;
    }
    const next = goal ? goal + (goal.endsWith(' ') ? '' : ' ') + text : text;
    setGoal(next.slice(0, max));
    setTimeout(() => taRef.current && taRef.current.focus(), 50);
  };
  return (
    <div className="fade-in" style={{padding:'32px 24px 24px'}}>
      <div style={{textAlign:'center', marginBottom:24}}>
        <div style={{fontSize:17, fontWeight:600, color:'#111', marginBottom:8, lineHeight:1.3}}>Describe your goal</div>
        <div style={{fontSize:13, color:'#999', lineHeight:1.5}}>Describe what you want to improve in this page, or pick a quick goal below.</div>
      </div>
      <div className="textarea-shell">
        <textarea
          ref={taRef}
          value={goal}
          onChange={(e) => setGoal(e.target.value.slice(0, max))}
          onFocus={applyDefaultGoal}
          placeholder="e.g, I want more visitors to click my signup button. I think a stronger headline and moving the button higher on the page might help."
          rows={5}
          disabled={enhancing}
          style={enhancing ? {opacity:0.5} : {}}
        />
        <div className="enhance-row">
          <button
            className={'enhance-btn' + (goal.length > 10 ? ' active' : '')}
            disabled={goal.length < 10 || enhancing}
            onClick={onEnhance}
          >

const DEFAULT_CHANGES = [
  { id: 'c1', title: 'Headline', kind: 'Text update', thumb: 'headline', targetId: 'target-headline', a: 'Master Markets, Power Your Financials', b: 'Take Control, Build Your Wealth Today' },
  { id: 'c2', title: 'CTA Button', kind: 'Text update', thumb: 'button', targetId: 'target-cta', a: 'Start Today', b: 'Start Free →' },
];
const ALT_HEADLINES = ['Take Control, Build Your Wealth Today', 'Invest Smarter, Live Freer', 'Your Money, Your Markets, Your Future', 'Wealth-building Built for Women', 'From First Trade to Financial Freedom'];
const ALT_CTAS = ['Start Free →', 'Get Started Now', 'Join the Community', 'Try It Free', 'Begin Your Journey'];

const Step3Variants = ({ changes, setChanges, onFocusChange, focusedChangeId, activeVariant, onSelectVariant }) => {
  const visibleChanges = changes.slice(0, 2);
  const [refreshing, setRefreshing] = useState({});

  const refresh = (id) => {
    setRefreshing(r => ({...r, [id]: true}));
    setTimeout(() => {
      setChanges(prev => prev.map(c => {
        if (c.id !== id) return c;
        if (c.title === 'Headline') return {...c, b: ALT_HEADLINES[Math.floor(Math.random()*ALT_HEADLINES.length)]};
        if (c.title === 'CTA Button') return {...c, b: ALT_CTAS[Math.floor(Math.random()*ALT_CTAS.length)]};
        return c;
      }));
      setRefreshing(r => ({...r, [id]: false}));
    }, 900);
  };

  const remove = (id) => {
    setChanges(prev => prev.map(c => c.id === id ? {...c, _removing: true} : c));
    setTimeout(() => setChanges(prev => prev.filter(c => c.id !== id)), 240);
  };

  return (
    <div className="changes-list fade-in">
      <div className="step3-banner">
        <span className="spark"><Icon name="sparkle" size={14} /></span>
        <div>AI-generated variant B with changes based on your set up. <strong>Edit with AI</strong></div>
      </div>

      <div className="step3-section">
        <h4>Test Variants</h4>
        <div className="sub">Click a variant to view and edit it on the canvas.</div>
        <div className="variant-picker">
          <div className={'variant-option' + (activeVariant === 'A' ? ' selected' : '')} onClick={() => onSelectVariant && onSelectVariant('A')} style={{cursor:'pointer'}}>
            <div className="left">
              <span className="dot">A</span>
              <span className="label">Variant A (Original)</span>
            </div>
            <button className="edit" title="Edit Variant A"><Icon name="edit" size={13} /></button>
          </div>
          <div className={'variant-option' + (activeVariant === 'B' ? ' selected' : '')} onClick={() => onSelectVariant && onSelectVariant('B')} style={{cursor:'pointer'}}>
            <div className="left">
              <span className="dot">B</span>
              <span className="label">Variant B</span>
            </div>
            <button className="edit" title="Edit Variant B"><Icon name="edit" size={13} /></button>
          </div>
        </div>
      </div>

      <div className="changes-review">
        <h4 className="title">Changes review ({visibleChanges.length})</h4>
        <div className="sub">Review the generated changes in variant B before finishing set up.</div>
      </div>

      {visibleChanges.length === 0 && (
        <div style={{textAlign:'center', padding:'28px 16px', color:'#6b6b6b', fontSize:13, border:'1px dashed #d9d9d9'}}>
          No changes left. Variant B is now identical to A.
        </div>
      )}

      <div className="changes-stack">
        {visibleChanges.map(c => (
          <div
            key={c.id}
            className={'change-card' + (c._removing ? ' removing' : '') + (focusedChangeId === c.id ? ' focused' : '')}
            onClick={(e) => {
              if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
              onFocusChange && onFocusChange(c);
            }}
            style={{cursor:'pointer'}}
          >
            <div className="change-card-head">
              <div>
                <div className="h">{c.title}</div>
                <div className="kind"><Icon name="edit" size={12} /> {c.kind}</div>
              </div>
              <div className="change-card-actions">
                <span className="ai-pill"><Icon name="sparkle" size={10} />AI</span>
                <button className={'icon-action' + (refreshing[c.id] ? ' refreshing' : '')} onClick={() => refresh(c.id)} title="Re-roll Variant B suggestion" disabled={refreshing[c.id]}>
                  <Icon name="refresh" size={14} />
                </button>
                <button className="icon-action" onClick={() => remove(c.id)} title="Delete this change"><Icon name="trash" size={14} /></button>
              </div>
            </div>

            <div className="variant-rows">
              <div className="row a">
                <span className="bullet">•</span>
                <div>
                  <span className="prefix">A:</span>
                  <span className="text">{c.a}</span>
                </div>
              </div>
              <div className="row b">
                <span className="bullet">•</span>
                <div>
                  <span className="prefix">B:</span>
                  <span className="text">{c.b}</span>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ============================================================
// WIZARD
// ============================================================
const STEP_LABELS = ['Goal', 'Settings', 'Variant B'];

const LOADER_MESSAGES = [
  "Analyzing 'Home' page...",
  "Reading your goal...",
  "Generating test settings...",
];

const Wizard = ({ onClose, onStart, previewVariant, setPreviewVariant, focusedChangeId, setFocusedChangeId, onVariantGeneratingChange }) => {
  const [step, setStep] = useState(0);
  const [isGenerating, setIsGenerating] = useState(false);
  const [generatingMode, setGeneratingMode] = useState('settings');
  const [loaderMsg, setLoaderMsg] = useState(LOADER_MESSAGES[0]);
  const [goal, setGoal] = useState('');
  const [enhancing, setEnhancing] = useState(false);
  const [outline, setOutline] = useState({
    testName: 'Drive more clicks to CTA',
    description: "Improve 'start today' button",
    mainMetric: 'Button clicks',
    duration: '14 days',
    audience: 'all',
    exposure: 100,
    split: '50/50',
    device: 'all',
    visitorType: 'all',
    splitA: 50,
  });
  const [changes, setChanges] = useState(DEFAULT_CHANGES);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  useEffect(() => {
    if (step === 2) setPreviewVariant('B');
    else setPreviewVariant('A');
  }, [step]);

  useEffect(() => {
    if (!onVariantGeneratingChange) return;
    onVariantGeneratingChange(isGenerating && generatingMode === 'variant-b');
  }, [isGenerating, generatingMode, onVariantGeneratingChange]);

  useEffect(() => () => {
    if (onVariantGeneratingChange) onVariantGeneratingChange(false);
  }, [onVariantGeneratingChange]);

  const enhance = async () => {
    setEnhancing(true);
    try {
      if (window.claude && window.claude.complete) {
        const out = await window.claude.complete(`Rewrite the following A/B-test goal so it's clearer, more specific, and actionable. Keep it under 280 characters. Only return the rewritten goal text — no preamble or quotes.\n\nGoal: "${goal}"`);
        if (out && typeof out === 'string') setGoal(out.trim().replace(/^["']|["']$/g, '').slice(0, 2000));
      } else {
        await new Promise(r => setTimeout(r, 800));
        setGoal(prev => prev + ' (Specifically: increase clickthrough on the primary hero CTA by 15% over 14 days.)');
      }
    } catch(e) {
      setGoal(prev => prev + ' (Specifically: increase clickthrough on the primary hero CTA by 15% over 14 days.)');
    }
    setEnhancing(false);
  };

  const goalValid = goal.trim().length >= 10;
  const outlineValid = outline.testName && outline.mainMetric && outline.duration;
  const canNext = (step === 0 && goalValid) || (step === 1 && outlineValid) || step === 2;

  const next = () => {
    if (!canNext) return;
    if (step === 0) {
      // Show loader before advancing to settings
      setGeneratingMode('settings');
      setIsGenerating(true);
      let msgIdx = 0;
      const msgTimer = setInterval(() => {
        msgIdx = (msgIdx + 1) % LOADER_MESSAGES.length;
        setLoaderMsg(LOADER_MESSAGES[msgIdx]);
      }, 800);
      setTimeout(() => {
        clearInterval(msgTimer);
        setIsGenerating(false);
        setLoaderMsg(LOADER_MESSAGES[0]);
        setStep(1);
      }, 2200);
    } else if (step < 2) {
      // Show loader before advancing to Variant B
      setGeneratingMode('variant-b');
      setLoaderMsg('Updating main button style...');
      setPreviewVariant('B');
      setIsGenerating(true);
      setTimeout(() => {
        setIsGenerating(false);
        setStep(2);
      }, 2200);
    } else {
      onStart({ goal, outline, changes });
    }
  };
  const back = () => {
    if (isGenerating) return;
    if (step === 0) onClose(); else setStep(step - 1);
  };

  return (
    <div className="floating-panel">
      <div className="panel-h">
        <div>
          <div className="title">Create A/B Test</div>
          <div className="subtitle">Test page variants to find the best performer</div>
        </div>
        <div className="actions">
          <button className="icon-btn" title="Help"><Icon name="help" size={16} /></button>
          <button className="icon-btn" title="Close" onClick={onClose}><Icon name="x" size={16} /></button>
        </div>
      </div>
      <div className="stepper">
        {STEP_LABELS.map((label, i) => (
          <React.Fragment key={i}>
            <button
              className={i === step ? 'active' : (i < step ? 'done' : '')}
              disabled={i > step}
              onClick={() => i <= step && setStep(i)}
            >
              {label}
            </button>
            {i < STEP_LABELS.length - 1 && (
              <span className="sep">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </span>
            )}
          </React.Fragment>
        ))}
      </div>
      <div className={'panel-body' + (!isGenerating && step === 2 ? ' variant-b-content-panel' : '')}>
        {isGenerating && (
          <div className="gen-loader">
            <div className="gen-loader-title">
              {generatingMode === 'variant-b' ? 'Generating Variant B with AI' : 'Generating Test Settings'}
            </div>
            <div className="gen-loader-bar"><div className="gen-loader-bar-fill" key={Date.now()} /></div>
            <div className="gen-loader-sub">
              {generatingMode === 'variant-b' ? 'Updating main button style...' : loaderMsg}
            </div>
          </div>
        )}
        {!isGenerating && step === 0 && <Step1Goal goal={goal} setGoal={setGoal} enhancing={enhancing} onEnhance={enhance} />}
        {!isGenerating && step === 1 && <Step2Outline outline={outline} setOutline={setOutline} />}
        {!isGenerating && step === 2 && (
          <Step3Variants
            changes={changes}
            setChanges={setChanges}
            focusedChangeId={focusedChangeId}
            activeVariant={previewVariant}
            onSelectVariant={setPreviewVariant}
            onFocusChange={(c) => {
              setFocusedChangeId(c.id);
              const el = document.getElementById(c.targetId);
              if (el) {
                const canvas = document.querySelector('.canvas-area');
                if (canvas) {
                  const elRect = el.getBoundingClientRect();
                  const canvasRect = canvas.getBoundingClientRect();
                  const offset = elRect.top - canvasRect.top + canvas.scrollTop - canvasRect.height/2 + elRect.height/2;
                  canvas.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
                }
                el.classList.add('target-focus');
                setTimeout(() => el.classList.remove('target-focus'), 2400);
              }
            }}
          />
        )}
      </div>
      <div className="panel-foot">
        {(step === 0 || step === 1) ? (
          <>
            {step === 0 ? (
              <button
                className={'generate-btn' + ((!canNext || isGenerating) ? ' disabled' : '')}
                onClick={next}
                disabled={!canNext || isGenerating}
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                  <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/>
                  <path d="M19 14l.75 2.25L22 17l-2.25.75L19 20l-.75-2.25L16 17l2.25-.75L19 14z"/>
                </svg>
                Generate settings
              </button>
            ) : (
              <div className="row">
                <button className="back-btn" onClick={back} disabled={isGenerating}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  {' '}Back
                </button>
                <button
                  className={'generate-btn inline' + ((!canNext || isGenerating) ? ' disabled' : '')}
                  onClick={next}
                  disabled={!canNext || isGenerating}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                    <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/>
                    <path d="M19 14l.75 2.25L22 17l-2.25.75L19 20l-.75-2.25L16 17l2.25-.75L19 14z"/>
                  </svg>
                  Generate variant B
                </button>
              </div>
            )}
          </>
        ) : (
          <div className="row">
            <button className="back-btn" onClick={back}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              {' '}Back
            </button>
            <button className={'next-btn' + (!canNext ? ' disabled' : '')} onClick={next} disabled={!canNext}>
              Finish Set Up
            </button>
          </div>
        )}
        <div className="disclaimer">AI can make mistakes. Always double check the results.</div>
      </div>
      {toast && (
        <div className="toast">
          <span>{toast.msg}</span>
          <button onClick={() => setToast(null)}>Dismiss</button>
        </div>
      )}
    </div>
  );
};
